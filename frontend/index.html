<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOLEVAULT — Sneaker Store</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface2: #1e1e1e;
  --surface3: #2a2a2a;
  --text: #f5f5f5;
  --text-dim: #888;
  --accent: #c8ff00;
  --accent-dim: #a3cc00;
  --danger: #ff4444;
  --success: #00e676;
  --border: #2a2a2a;
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 20px;
  --font: 'Outfit', sans-serif;
  --mono: 'Space Mono', monospace;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
  --ease: 0.25s cubic-bezier(0.4,0,0.2,1);
}

body { background: var(--bg); color: var(--text); font-family: var(--font); overflow-x: hidden; }

@keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
@keyframes pulse { 0%,100% { opacity:0.4; } 50% { opacity:0.8; } }
@keyframes marquee { 0% { transform:translateX(0); } 100% { transform:translateX(-50%); } }
@keyframes glowPulse { 0%,100% { box-shadow:0 0 20px rgba(200,255,0,0.08); } 50% { box-shadow:0 0 40px rgba(200,255,0,0.18); } }

/* ── Navbar ── */
.navbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(10,10,10,0.88); backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 clamp(16px,4vw,48px); height: 68px;
  display: flex; align-items: center; justify-content: space-between;
}
.nav-logo {
  font-family: var(--mono); font-size: 1.2rem; font-weight: 700;
  cursor: pointer; user-select: none; display: flex; align-items: center; gap: 8px;
}
.nav-logo span { color: var(--accent); }
.nav-links { display: flex; align-items: center; gap: 4px; }
.nav-link {
  padding: 8px 14px; border-radius: var(--radius-sm);
  font-size: 0.84rem; font-weight: 500; color: var(--text-dim);
  cursor: pointer; transition: var(--ease);
  border: none; background: none; font-family: var(--font); position: relative;
}
.nav-link:hover { color: var(--text); background: var(--surface2); }
.nav-link.active { color: var(--accent); }
.badge {
  position: absolute; top: 2px; right: 2px;
  width: 17px; height: 17px; background: var(--accent); color: var(--bg);
  border-radius: 50%; font-size: 0.62rem; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}
.nav-btn {
  padding: 9px 20px; border-radius: var(--radius);
  font-size: 0.84rem; font-weight: 600; cursor: pointer;
  transition: var(--ease); border: none; font-family: var(--font);
}
.nav-btn-primary { background: var(--accent); color: var(--bg); }
.nav-btn-primary:hover { background: var(--accent-dim); }
.nav-btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
.nav-btn-ghost:hover { border-color: var(--text-dim); background: var(--surface); }
.mob-btn { display: none; background: none; border: none; color: var(--text); font-size: 1.4rem; cursor: pointer; }

/* ── Auth ── */
.auth-page { min-height: 100vh; display: flex; background: var(--bg); }
.auth-visual {
  flex: 1; display: none; position: relative; overflow: hidden;
  background: linear-gradient(135deg, #0a0a0a, #1a1a1a, #0a0a0a);
  align-items: center; justify-content: center;
}
.auth-visual-inner { text-align: center; z-index: 2; animation: fadeUp 0.8s ease; }
.auth-visual-inner h1 { font-size: clamp(3rem,5vw,4.5rem); font-weight: 900; line-height: 0.95; letter-spacing: -3px; }
.auth-visual-inner h1 span { color: var(--accent); }
.auth-visual-inner p { margin-top: 16px; font-size: 0.9rem; color: var(--text-dim); letter-spacing: 3px; text-transform: uppercase; }
.auth-grid {
  position: absolute; inset: 0;
  background-image: linear-gradient(rgba(200,255,0,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(200,255,0,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
}
.auth-glow {
  position: absolute; width: 350px; height: 350px;
  background: radial-gradient(circle, rgba(200,255,0,0.07), transparent 70%);
  border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%,-50%);
  animation: glowPulse 4s ease-in-out infinite;
}
.auth-form-side {
  flex: 1; max-width: 520px; display: flex; flex-direction: column;
  justify-content: center; padding: clamp(28px,5vw,72px);
  animation: fadeUp 0.6s ease;
}
.back-home {
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--text-dim); font-size: 0.84rem; font-weight: 500;
  cursor: pointer; border: none; background: none; font-family: var(--font);
  margin-bottom: 28px; transition: var(--ease); padding: 0;
}
.back-home:hover { color: var(--accent); }
.back-home svg { width: 16px; height: 16px; }
.auth-form-side h2 { font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 6px; }
.auth-form-side .sub { color: var(--text-dim); font-size: 0.92rem; margin-bottom: 32px; }
.auth-form { display: flex; flex-direction: column; gap: 14px; }
.form-row { display: flex; gap: 12px; }
.form-row > .fg { flex: 1; }
.fg { display: flex; flex-direction: column; gap: 5px; }
.fl { font-size: 0.76rem; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
.fi {
  padding: 13px 14px; background: var(--surface);
  border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text); font-size: 0.92rem; font-family: var(--font);
  transition: var(--ease); outline: none; width: 100%;
}
.fi::placeholder { color: #555; }
.fi:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(200,255,0,0.1); }
.auth-submit {
  margin-top: 6px; padding: 15px; background: var(--accent); color: var(--bg);
  border: none; border-radius: var(--radius); font-size: 0.95rem; font-weight: 700;
  font-family: var(--font); cursor: pointer; transition: var(--ease);
}
.auth-submit:hover:not(:disabled) { background: var(--accent-dim); transform: translateY(-1px); }
.auth-submit:disabled { opacity: 0.5; cursor: not-allowed; }
.auth-switch { margin-top: 22px; text-align: center; font-size: 0.88rem; color: var(--text-dim); }
.auth-switch button {
  background: none; border: none; color: var(--accent); font-family: var(--font);
  font-weight: 600; font-size: 0.88rem; cursor: pointer; margin-left: 4px;
  text-decoration: underline; text-underline-offset: 3px;
}
.auth-error {
  padding: 11px 14px; background: rgba(255,68,68,0.1);
  border: 1px solid rgba(255,68,68,0.3); border-radius: var(--radius-sm);
  color: var(--danger); font-size: 0.84rem; margin-bottom: 6px;
}
.extra-toggle {
  background: none; border: none; color: var(--text-dim); font-family: var(--font);
  font-size: 0.8rem; cursor: pointer; text-align: left; padding: 2px 0;
  text-decoration: underline; text-underline-offset: 3px;
}

/* ── Hero ── */
.hero {
  padding: 130px clamp(16px,4vw,48px) 70px;
  position: relative; overflow: hidden; min-height: 75vh;
  display: flex; align-items: center;
}
.hero-grid {
  position: absolute; inset: 0;
  background-image: linear-gradient(rgba(200,255,0,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(200,255,0,0.02) 1px, transparent 1px);
  background-size: 80px 80px;
}
.hero-fade { position: absolute; bottom: 0; left: 0; right: 0; height: 180px; background: linear-gradient(to top, var(--bg), transparent); z-index: 1; }
.hero-content { position: relative; z-index: 2; max-width: 800px; animation: fadeUp 0.8s ease; }
.hero-tag {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 7px 14px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 100px; font-size: 0.78rem; font-weight: 500;
  color: var(--accent); margin-bottom: 24px; letter-spacing: 1px; text-transform: uppercase;
}
.hero-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
.hero h1 { font-size: clamp(2.8rem,7vw,5.5rem); font-weight: 900; line-height: 0.92; letter-spacing: -3px; margin-bottom: 24px; }
.hero h1 .a { color: var(--accent); }
.hero h1 .o { -webkit-text-stroke: 2px var(--text); color: transparent; }
.hero-desc { font-size: clamp(0.95rem,1.4vw,1.1rem); color: var(--text-dim); max-width: 480px; line-height: 1.7; margin-bottom: 36px; font-weight: 300; }
.hero-actions { display: flex; gap: 14px; flex-wrap: wrap; }
.btn-p {
  padding: 14px 32px; background: var(--accent); color: var(--bg); border: none;
  border-radius: var(--radius); font-size: 0.92rem; font-weight: 700;
  font-family: var(--font); cursor: pointer; transition: var(--ease);
}
.btn-p:hover { background: var(--accent-dim); transform: translateY(-2px); }
.btn-o {
  padding: 14px 32px; background: transparent; color: var(--text);
  border: 1.5px solid var(--border); border-radius: var(--radius);
  font-size: 0.92rem; font-weight: 600; font-family: var(--font);
  cursor: pointer; transition: var(--ease);
}
.btn-o:hover { border-color: var(--text-dim); background: var(--surface); transform: translateY(-2px); }

/* ── Marquee ── */
.marquee-wrap {
  overflow: hidden; padding: 20px 0;
  border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.marquee-track { display: flex; width: max-content; animation: marquee 25s linear infinite; }
.marquee-item {
  padding: 0 40px; font-size: 1rem; font-weight: 700; letter-spacing: 3px;
  text-transform: uppercase; color: var(--text-dim); white-space: nowrap;
  display: flex; align-items: center; gap: 40px;
}
.mdot { width: 5px; height: 5px; background: var(--accent); border-radius: 50%; display: inline-block; }

/* ── Sections ── */
.sec { padding: 70px clamp(16px,4vw,48px); }
.sec-head { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px; flex-wrap: wrap; gap: 12px; }
.sec-head h2 { font-size: clamp(1.6rem,2.5vw,2.2rem); font-weight: 800; letter-spacing: -1.5px; line-height: 1; }
.sec-head h2 span { color: var(--accent); }
.sec-head p { color: var(--text-dim); font-size: 0.88rem; margin-top: 6px; }

/* ── Filter ── */
.filter-bar { display: flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; align-items: center; }
.search-wrap { position: relative; flex: 1; min-width: 220px; }
.search-wrap .ico { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 0.85rem; }
.search-wrap input {
  width: 100%; padding: 11px 14px 11px 40px; background: var(--surface);
  border: 1.5px solid var(--border); border-radius: var(--radius); color: var(--text);
  font-size: 0.88rem; font-family: var(--font); outline: none; transition: var(--ease);
}
.search-wrap input:focus { border-color: var(--accent); }
.sel {
  padding: 11px 14px; background: var(--surface); border: 1.5px solid var(--border);
  border-radius: var(--radius); color: var(--text); font-size: 0.84rem;
  font-family: var(--font); cursor: pointer; outline: none; min-width: 130px;
}
.sel option { background: var(--surface); }
.chip {
  padding: 9px 18px; background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 100px; color: var(--text-dim); font-size: 0.8rem; font-weight: 500;
  font-family: var(--font); cursor: pointer; transition: var(--ease);
}
.chip:hover { border-color: var(--text-dim); color: var(--text); }
.chip.on { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 600; }

/* ── Product Grid ── */
.pgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 18px; }
.pcard {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); overflow: hidden;
  transition: var(--ease); cursor: default; animation: fadeUp 0.5s ease both;
}
.pcard:hover { transform: translateY(-4px); box-shadow: var(--shadow); }
.pcard-img {
  height: 200px; background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.pcard-img .shoe { font-size: 3.5rem; opacity: 0.12; }
.stock-badge {
  position: absolute; top: 10px; right: 10px; padding: 3px 9px;
  border-radius: 100px; font-size: 0.68rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.4px;
}
.s-ok { background: rgba(0,230,118,0.1); color: var(--success); }
.s-low { background: rgba(255,68,68,0.15); color: var(--danger); }
.s-out { background: rgba(255,68,68,0.25); color: var(--danger); }
.pcard-body { padding: 18px; }
.pcard-brand { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); font-weight: 600; margin-bottom: 4px; }
.pcard-name { font-size: 1rem; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 8px; }
.pcard-meta { display: flex; justify-content: space-between; align-items: center; }
.pcard-price { font-family: var(--mono); font-size: 1.05rem; font-weight: 700; }
.pcard-rating { font-size: 0.8rem; color: var(--text-dim); }
.pcard-rating .star { color: #ffd700; }
.cart-btn {
  margin-top: 14px; width: 100%; padding: 11px; background: var(--accent); color: var(--bg);
  border: none; border-radius: var(--radius-sm); font-size: 0.8rem; font-weight: 700;
  font-family: var(--font); cursor: pointer; transition: var(--ease);
}
.cart-btn:hover:not(:disabled) { background: var(--accent-dim); }
.cart-btn:disabled { opacity: 0.3; cursor: not-allowed; background: var(--surface3); color: var(--text-dim); }

/* ── Category Cards ── */
.cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }
.cat-card {
  padding: 28px 20px; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); text-align: center; cursor: pointer; transition: var(--ease);
}
.cat-card:hover { transform: translateY(-3px); border-color: var(--accent); }
.cat-icon { font-size: 1.8rem; margin-bottom: 10px; }
.cat-name { font-size: 0.88rem; font-weight: 600; }

/* ── Cart ── */
.cart-item {
  display: flex; align-items: center; gap: 16px;
  padding: 18px; background: var(--surface); border-radius: var(--radius-lg);
  border: 1px solid var(--border); margin-bottom: 10px;
}
.cart-thumb {
  width: 70px; height: 70px; background: var(--surface2); border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center; font-size: 1.8rem; opacity: 0.15; flex-shrink: 0;
}
.cart-info { flex: 1; }
.qty-btn {
  width: 30px; height: 30px; border-radius: var(--radius-sm);
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); cursor: pointer; font-size: 1rem;
  display: flex; align-items: center; justify-content: center; font-family: var(--font);
}
.qty-btn:hover { background: var(--surface3); }
.summary-box {
  padding: 24px; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); position: sticky; top: 90px;
}

/* ── Footer ── */
.footer {
  padding: 50px clamp(16px,4vw,48px) 28px;
  border-top: 1px solid var(--border); background: var(--surface);
}
.footer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 36px; margin-bottom: 40px; }
.footer-col h4 { font-size: 0.76rem; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); margin-bottom: 16px; font-weight: 600; }
.footer-col a { display: block; color: var(--text-dim); font-size: 0.85rem; padding: 5px 0; text-decoration: none; cursor: pointer; transition: var(--ease); }
.footer-col a:hover { color: var(--text); }
.footer-bottom {
  padding-top: 20px; border-top: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;
}
.footer-bottom p { font-size: 0.76rem; color: var(--text-dim); }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  padding: 12px 22px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius); font-size: 0.86rem; color: var(--text);
  box-shadow: var(--shadow); animation: fadeUp 0.3s ease; z-index: 200;
  display: flex; align-items: center; gap: 8px;
}
.toast.ok { border-color: var(--success); }
.toast.err { border-color: var(--danger); }

/* ── Empty ── */
.empty { text-align: center; padding: 70px 20px; color: var(--text-dim); }
.empty .big { font-size: 2.8rem; margin-bottom: 14px; }
.empty .t { font-size: 1.05rem; font-weight: 600; color: var(--text); }

/* ── Responsive ── */
@media (min-width:900px) { .auth-visual { display: flex; } }
@media (max-width:899px) { .auth-form-side { max-width: 100%; } }
@media (max-width:768px) {
  .mob-btn { display: block; }
  .nav-links.desk { display: none; }
  .nav-links.mob-open {
    display: flex; position: fixed; top: 68px; left: 0; right: 0; bottom: 0;
    background: var(--bg); flex-direction: column; padding: 20px; gap: 6px; z-index: 99;
  }
  .filter-bar { flex-direction: column; }
  .pgrid { grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); }
  .form-row { flex-direction: column; gap: 14px; }
  .hero h1 { letter-spacing: -2px; }
  .cart-layout { flex-direction: column !important; }
}
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }
</style>
</head>
<body>

<div id="app"></div>
<div id="toast-container"></div>

<script>
const API = "http://localhost:8000/api";
const BRANDS = ["Nike","Adidas","Jordan","New Balance","Puma","Converse","Reebok","Vans"];
const CATS = ["Running","Basketball","Lifestyle","Skateboarding","Training","Classics"];
const CAT_ICO = { Running:"🏃", Basketball:"🏀", Lifestyle:"✦", Skateboarding:"🛹", Training:"🔥", Classics:"★" };
const ARROW = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>';

const P = [
  {id:1,name:"Air Max 97",brand:"Nike",cat:"Lifestyle",price:175,rating:4.7,reviews:342,stock:12,desc:"Heritage running style.",pop:95},
  {id:2,name:"Ultraboost 23",brand:"Adidas",cat:"Running",price:190,rating:4.8,reviews:518,stock:8,desc:"Responsive Boost cushioning.",pop:92},
  {id:3,name:"Retro 4 'Bred'",brand:"Jordan",cat:"Basketball",price:210,rating:4.9,reviews:1204,stock:3,desc:"Iconic AJ4 in Bred colorway.",pop:99},
  {id:4,name:"550 White Green",brand:"New Balance",cat:"Lifestyle",price:110,rating:4.5,reviews:876,stock:22,desc:"Heritage court comfort.",pop:88},
  {id:5,name:"Suede Classic",brand:"Puma",cat:"Classics",price:75,rating:4.3,reviews:203,stock:30,desc:"Timeless icon since 1968.",pop:78},
  {id:6,name:"Chuck 70 Hi",brand:"Converse",cat:"Lifestyle",price:90,rating:4.6,reviews:654,stock:18,desc:"Premium canvas, vintage details.",pop:85},
  {id:7,name:"Club C 85",brand:"Reebok",cat:"Classics",price:80,rating:4.4,reviews:312,stock:25,desc:"Clean leather from '85.",pop:80},
  {id:8,name:"Old Skool",brand:"Vans",cat:"Skateboarding",price:70,rating:4.5,reviews:921,stock:35,desc:"The sidestripe original.",pop:90},
  {id:9,name:"Dunk Low Panda",brand:"Nike",cat:"Lifestyle",price:115,rating:4.7,reviews:2103,stock:0,desc:"Black and white streetwear icon.",pop:98},
  {id:10,name:"Forum Low",brand:"Adidas",cat:"Basketball",price:100,rating:4.4,reviews:445,stock:14,desc:"Retro basketball with ankle strap.",pop:82},
  {id:11,name:"Gel-Kayano 14",brand:"Nike",cat:"Running",price:150,rating:4.6,reviews:278,stock:9,desc:"Y2K runner aesthetics.",pop:87},
  {id:12,name:"RS-X Reinvention",brand:"Puma",cat:"Training",price:120,rating:4.2,reviews:167,stock:20,desc:"Bold chunky silhouette.",pop:74},
];

const S = { page:"home", user:null, tokens:null, cart:[], search:"", sort:"popularity", cat:"All", mob:false, showCats:false };

/* ── Auth API ── */
async function doLogin(email, pw) {
  const r = await fetch(`${API}/auth/login/`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email,password:pw})});
  const d = await r.json();
  if(!r.ok) throw new Error(d.detail||d.error||"Login failed");
  S.tokens={token:d.token}; S.user=d.user;
  localStorage.setItem("sv_tokens",JSON.stringify(S.tokens));
  localStorage.setItem("sv_user",JSON.stringify(S.user));
}
async function doRegister(f) {
  const r = await fetch(`${API}/auth/register/`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(f)});
  const d = await r.json();
  if(!r.ok) throw new Error(d.detail||d.error||(typeof d==='object'?Object.values(d).flat().join(", "):"Registration failed"));
  S.tokens={token:d.token}; S.user=d.user;
  localStorage.setItem("sv_tokens",JSON.stringify(S.tokens));
  localStorage.setItem("sv_user",JSON.stringify(S.user));
}
function doLogout() {
  if(S.tokens?.token) fetch(`${API}/auth/logout/`,{method:"POST",headers:{Authorization:`Token ${S.tokens.token}`}}).catch(()=>{});
  S.user=null; S.tokens=null;
  localStorage.removeItem("sv_tokens");
  localStorage.removeItem("sv_user");
}
async function restore() {
  const s=localStorage.getItem("sv_tokens");
  const u=localStorage.getItem("sv_user");
  if(!s || !u) return;
  try {
    const t=JSON.parse(s);
    const user=JSON.parse(u);
    if(!t?.token || !user?.email) throw 0;
    S.tokens=t;
    S.user=user;
  } catch { doLogout(); }
}

/* ── Helpers ── */
function toast(msg,ok=true) {
  document.getElementById("toast-container").innerHTML=`<div class="toast ${ok?'ok':'err'}">${ok?'✓':'✕'} ${msg}</div>`;
  setTimeout(()=>document.getElementById("toast-container").innerHTML="",3000);
}
function addCart(id) {
  const p=P.find(x=>x.id===id); if(!p||p.stock===0) return;
  const e=S.cart.find(x=>x.id===id);
  if(e){if(e.qty>=p.stock){toast("Max stock reached",false);return;} e.qty++;}
  else S.cart.push({...p,qty:1});
  toast(p.name+" added to cart"); render();
}
function updQty(id,d) {
  const i=S.cart.find(x=>x.id===id); if(!i) return;
  const n=i.qty+d;
  if(n<=0) S.cart=S.cart.filter(x=>x.id!==id);
  else if(n>i.stock){toast("Max stock",false);return;}
  else i.qty=n;
  render();
}
function cc(){ return S.cart.reduce((s,i)=>s+i.qty,0); }
function go(p){
  S.page=p;
  S.mob=false;
  if(p==="shop") S.showCats=false;
  window.scrollTo(0,0);
  render();
}

function filtered() {
  const q=S.search.toLowerCase();
  return P.filter(p=>{
    const ms=!q||p.name.toLowerCase().includes(q)||p.desc.toLowerCase().includes(q)||p.brand.toLowerCase().includes(q);
    const mc=S.cat==="All"||p.cat===S.cat;
    return ms&&mc;
  }).sort((a,b)=>{
    if(S.sort==="price-asc")return a.price-b.price;
    if(S.sort==="price-desc")return b.price-a.price;
    if(S.sort==="rating")return b.rating-a.rating;
    return b.pop-a.pop;
  });
}

/* ── Product Card ── */
function card(p,dl=0) {
  const sl=p.stock===0?"Sold Out":p.stock<=5?`Only ${p.stock} left`:"In Stock";
  const sc=p.stock===0?"s-out":p.stock<=5?"s-low":"s-ok";
  return `<div class="pcard" style="animation-delay:${dl}s">
    <div class="pcard-img"><span class="shoe">👟</span><span class="stock-badge ${sc}">${sl}</span></div>
    <div class="pcard-body">
      <div class="pcard-brand">${p.brand}</div>
      <div class="pcard-name">${p.name}</div>
      <div class="pcard-meta">
        <span class="pcard-price">$${p.price}</span>
        <span class="pcard-rating"><span class="star">★</span> ${p.rating} <span style="color:#555">(${p.reviews})</span></span>
      </div>
      <button class="cart-btn" ${p.stock===0?'disabled':''} onclick="addCart(${p.id})">${p.stock===0?'Out of Stock':'Add to Cart'}</button>
    </div></div>`;
}

/* ═══ RENDER ═══ */
function render() {
  const a=document.getElementById("app");
  if(S.page==="login"){a.innerHTML=rLogin();return;}
  if(S.page==="register"){a.innerHTML=rRegister();return;}
  a.innerHTML=rNav()+rPage();
}

/* ── Navbar ── */
function rNav() {
  const u=S.user, c=cc(), p=S.page, mc=S.mob?"mob-open":"desk";
  let lk=`<button class="nav-link ${p==='home'?'active':''}" onclick="go('home')">Home</button>`;
  lk+=`<button class="nav-link ${p==='shop'?'active':''}" onclick="go('shop')">Shop</button>`;
  lk+=`<button class="nav-link" onclick="go('cart')" style="position:relative">🛒 Cart${c>0?`<span class="badge">${c}</span>`:''}</button>`;
  if(u){
    lk+=`<button class="nav-link" onclick="go('profile')">👤 ${u.first_name||u.username||'Profile'}</button>`;
    lk+=`<button class="nav-btn nav-btn-ghost" onclick="doLogout();go('home')">Sign Out</button>`;
  } else {
    lk+=`<button class="nav-btn nav-btn-ghost" onclick="go('login')">Sign In</button>`;
    lk+=`<button class="nav-btn nav-btn-primary" onclick="go('register')">Sign Up</button>`;
  }
  return `<nav class="navbar">
    <div class="nav-logo" onclick="go('home')">✦ <span>SOLE</span>VAULT</div>
    <button class="mob-btn" onclick="S.mob=!S.mob;render()">${S.mob?'✕':'☰'}</button>
    <div class="nav-links ${mc}">${lk}</div></nav>`;
}

/* ── Login ── */
function rLogin() {
  return `<div class="auth-page">
    <div class="auth-visual"><div class="auth-grid"></div><div class="auth-glow"></div>
      <div class="auth-visual-inner"><h1>STEP<br>INTO<br><span>STYLE</span></h1><p>Premium Sneakers • Since 2026</p></div></div>
    <div class="auth-form-side">
      <button class="back-home" onclick="go('home')">${ARROW} Back to home</button>
      <h2>Welcome back</h2><p class="sub">Sign in to your SOLEVAULT account</p>
      <div id="auth-err"></div>
      <form class="auth-form" onsubmit="hLogin(event)">
        <div class="fg"><label class="fl">Email</label><input class="fi" type="email" id="l-email" placeholder="you@example.com" autocomplete="email" required></div>
        <div class="fg"><label class="fl">Password</label><input class="fi" type="password" id="l-pw" placeholder="••••••••" autocomplete="current-password" required></div>
        <button type="submit" class="auth-submit" id="l-btn">Sign In</button>
      </form>
      <p class="auth-switch">Don't have an account? <button onclick="go('register')">Create one</button></p>
    </div></div>`;
}
async function hLogin(e) {
  e.preventDefault();
  const em=document.getElementById("l-email").value, pw=document.getElementById("l-pw").value;
  const btn=document.getElementById("l-btn"), err=document.getElementById("auth-err");
  if(!em||!pw){err.innerHTML='<div class="auth-error">All fields are required.</div>';return;}
  btn.disabled=true; btn.textContent="Signing in..."; err.innerHTML="";
  try{await doLogin(em,pw);go("home");}catch(x){err.innerHTML=`<div class="auth-error">${x.message}</div>`;btn.disabled=false;btn.textContent="Sign In";}
}

/* ── Register ── */
function rRegister() {
  return `<div class="auth-page">
    <div class="auth-visual"><div class="auth-grid"></div><div class="auth-glow"></div>
      <div class="auth-visual-inner"><h1>JOIN<br>THE<br><span>VAULT</span></h1><p>Your Sneaker Journey Starts Here</p></div></div>
    <div class="auth-form-side">
      <button class="back-home" onclick="go('home')">${ARROW} Back to home</button>
      <h2>Create account</h2><p class="sub">Join SOLEVAULT and start shopping</p>
      <div id="auth-err"></div>
      <form class="auth-form" onsubmit="hReg(event)">
        <div class="form-row">
          <div class="fg"><label class="fl">First Name *</label><input class="fi" id="r-fn" placeholder="John" required></div>
          <div class="fg"><label class="fl">Last Name *</label><input class="fi" id="r-ln" placeholder="Doe" required></div>
        </div>
        <div class="fg"><label class="fl">Username *</label><input class="fi" id="r-un" placeholder="johndoe" autocomplete="username" required></div>
        <div class="fg"><label class="fl">Email *</label><input class="fi" type="email" id="r-em" placeholder="you@example.com" autocomplete="email" required></div>

        <div id="xf" style="display:none;flex-direction:column;gap:14px">
          <div class="fg"><label class="fl">Tax ID</label><input class="fi" id="r-tax" placeholder="Optional"></div>
          <div class="fg"><label class="fl">Home Address</label><input class="fi" id="r-addr" placeholder="Optional"></div>
        </div>

      </form>
      <p class="auth-switch">Already have an account? <button onclick="go('login')">Sign in</button></p>
    </div></div>`;
}
async function hReg(e) {
  e.preventDefault();
  const f={first_name:document.getElementById("r-fn").value,last_name:document.getElementById("r-ln").value,username:document.getElementById("r-un").value,email:document.getElementById("r-em").value,password:document.getElementById("r-pw").value,tax_id:document.getElementById("r-tax")?.value||"",home_address:document.getElementById("r-addr")?.value||""};
  const cf=document.getElementById("r-cf").value;
  const btn=document.getElementById("r-btn"),err=document.getElementById("auth-err");
  if(!f.first_name||!f.last_name||!f.username||!f.email||!f.password){err.innerHTML='<div class="auth-error">Please fill in all required fields.</div>';return;}
  if(f.password!==cf){err.innerHTML='<div class="auth-error">Passwords do not match.</div>';return;}
  if(f.password.length<6){err.innerHTML='<div class="auth-error">Password must be at least 6 characters.</div>';return;}
  btn.disabled=true; btn.textContent="Creating account..."; err.innerHTML="";
  try{await doRegister(f);go("home");}catch(x){err.innerHTML=`<div class="auth-error">${x.message}</div>`;btn.disabled=false;btn.textContent="Create Account";}
}

/* ── Page Router ── */
function rPage() {
  switch(S.page){
    case "shop": return rShop();
    case "cart": return rCart();
    case "profile": return rPlaceholder("My Profile","👤");
    default: return rHome();
  }
}

        <div class="hero-tag"><span class="hero-dot"></span> Start Shopping</div>

        <div class="hero-actions">

      <div class="cat-grid">${CATS.map(c=>`<div class="cat-card" onclick="S.cat='${c}';render();setTimeout(()=>document.getElementById('shop')?.scrollIntoView({behavior:'smooth'}),50)"><div class="cat-icon">${CAT_ICO[c]}</div><div class="cat-name">${c}</div></div>`).join('')}</div>

      <div class="sec-head"><div><h2>All <span>Sneakers</span></h2><p>${f.length} product${f.length!==1?'s':''}</p></div></div>

        <select class="sel" onchange="S.sort=this.value;render()">
          <option value="popularity" ${S.sort==='popularity'?'selected':''}>Popularity</option>
          <option value="price-asc" ${S.sort==='price-asc'?'selected':''}>Price ↑</option>
          <option value="price-desc" ${S.sort==='price-desc'?'selected':''}>Price ↓</option>

        <div class="footer-col"><h4>Company</h4><a>About</a><a>Careers</a><a>Blog</a></div>

      </div>

        <p style="font-family:var(--mono);color:var(--accent);font-size:0.78rem">✦ SOLEVAULT</p>

/* ── Cart ── */
function rCart() {
  const tot=S.cart.reduce((s,i)=>s+i.price*i.qty,0);
  const cnt=S.cart.reduce((s,i)=>s+i.qty,0);
  if(!S.cart.length) return `<div class="sec" style="padding-top:96px;min-height:100vh">
    <h2 style="font-size:1.8rem;font-weight:800;letter-spacing:-1px;margin-bottom:32px">Your Cart</h2>
    <div class="empty"><div class="big">🛒</div><p class="t">Your cart is empty</p>
      <button class="btn-p" style="margin-top:20px" onclick="go('home')">Start Shopping</button></div></div>`;

  return `<div class="sec" style="padding-top:96px;min-height:100vh">
    <h2 style="font-size:1.8rem;font-weight:800;letter-spacing:-1px;margin-bottom:32px">Your Cart</h2>
    <div style="display:flex;gap:28px;flex-wrap:wrap" class="cart-layout">

            <div style="font-family:var(--mono);margin-top:3px;font-size:0.9rem">$${i.price}</div>
          </div>
          <div style="display:flex;align-items:center;gap:10px">

            <span style="font-weight:700;min-width:18px;text-align:center">${i.qty}</span>
            <button class="qty-btn" onclick="updQty(${i.id},1)">+</button>
          </div>
          <div style="font-family:var(--mono);font-weight:700;min-width:65px;text-align:right">$${(i.price*i.qty).toFixed(2)}</div>
        </div>`).join('')}</div>
      <div style="flex:1;min-width:260px"><div class="summary-box">
        <h3 style="font-weight:700;margin-bottom:18px;font-size:1.05rem">Order Summary</h3>

        <button class="auth-submit" style="margin-top:18px;width:100%" onclick="${S.user?`toast('Checkout coming soon!')`:`go('login');toast('Please sign in to checkout',false)`}">${S.user?'Proceed to Checkout':'Sign In to Checkout'}</button>
      </div></div>
    </div></div>`;
}

/* ── Placeholder ── */
function rPlaceholder(title,ico) {
  return `<div class="sec" style="padding-top:96px;min-height:100vh;text-align:center">
    <div style="font-size:3.5rem;margin-bottom:18px;opacity:0.3">${ico}</div>
    <h2 style="font-size:1.8rem;font-weight:800;letter-spacing:-1px;margin-bottom:10px">${title}</h2>
    <p style="color:var(--text-dim);margin-bottom:28px">Coming in the next sprint.</p>
    <button class="btn-o" onclick="go('home')">Back to Home</button></div>`;
}

/* ── Keep search focus on re-render ── */
const _r=render;
render=function(){
  const si=document.getElementById("si");
  const had=si&&document.activeElement===si;
  const cp=had?si.selectionStart:null;
  _r();
  if(had){const n=document.getElementById("si");if(n){n.focus();if(cp!==null)n.setSelectionRange(cp,cp);}}
};

restore().then(()=>render());
</script>
